<div class="page-container">
  <app-page-header title="Clientes" subtitle="Gerencie os clientes da sua loja">
    <button actions mat-flat-button color="primary" routerLink="/clientes/novo">
      <mat-icon>add</mat-icon> Novo Cliente
    </button>
  </app-page-header>

  <div class="search-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar clientes</mat-label>
      <input matInput [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()"
        placeholder="Nome, e-mail ou CPF/CNPJ..." />
      <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="table-container card-elevated">
    <table mat-table [dataSource]="pagedCustomers()" class="full-width-table">

      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let row">{{ (row.firstName ?? '') + ' ' + (row.lastName ?? '') }}</td>
      </ng-container>

      <ng-container matColumnDef="cellPhone">
        <th mat-header-cell *matHeaderCellDef>Celular</th>
        <td mat-cell *matCellDef="let row">{{ row.cellPhone ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-mail</th>
        <td mat-cell *matCellDef="let row">{{ row.email ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="document">
        <th mat-header-cell *matHeaderCellDef>CPF/CNPJ</th>
        <td mat-cell *matCellDef="let row">{{ row.document ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button [routerLink]="['/clientes', row.id]" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteCustomer(row)" matTooltip="Excluir">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">
          @if (loading()) {
          Carregando...
          } @else {
          <div class="empty-state">
            <mat-icon>inbox</mat-icon>
            <span>Nenhum cliente encontrado</span>
          </div>
          }
        </td>
      </tr>
    </table>

    <mat-paginator [length]="filteredCustomers().length" [pageSize]="pageSize" [pageSizeOptions]="[10, 20, 50, 100]"
      (page)="onPage($event)" showFirstLastButtons />
  </div>
</div>
