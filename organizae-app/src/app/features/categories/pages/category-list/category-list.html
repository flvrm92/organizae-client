<div class="page-container">
  <app-page-header title="Categorias" subtitle="Gerencie as categorias de produtos">
    <button actions mat-flat-button color="primary" routerLink="/categorias/nova">
      <mat-icon>add</mat-icon> Nova Categoria
    </button>
  </app-page-header>

  <div class="search-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar categorias</mat-label>
      <input matInput [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()" placeholder="Nome..." />
      <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="table-container card-elevated">
    <table mat-table [dataSource]="pagedCategories()" class="full-width-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>
      <ng-container matColumnDef="parentCategory">
        <th mat-header-cell *matHeaderCellDef>Categoria Pai</th>
        <td mat-cell *matCellDef="let row">{{ row.parentCategoryName ?? '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button [routerLink]="['/categorias', row.id]" matTooltip="Editar"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="deleteCategory(row)" matTooltip="Excluir"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">
          <div class="empty-state">
            <mat-icon>inbox</mat-icon>
            <span>Nenhuma categoria encontrada</span>
          </div>
        </td>
      </tr>
    </table>
    <mat-paginator
      [length]="filteredCategories().length"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPage($event)"
      showFirstLastButtons />
  </div>
</div>
