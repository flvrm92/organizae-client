<div class="page-container">
  <app-page-header title="Fornecedores" subtitle="Gerencie os fornecedores">
    <button actions mat-flat-button color="primary" routerLink="/fornecedores/novo">
      <mat-icon>add</mat-icon> Novo Fornecedor
    </button>
  </app-page-header>

  <div class="search-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar fornecedores</mat-label>
      <input matInput [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()" placeholder="Nome, e-mail..." />
      <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="pagedSuppliers()" class="full-width-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-mail</th>
        <td mat-cell *matCellDef="let row">{{ row.email ?? '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Telefone</th>
        <td mat-cell *matCellDef="let row">{{ row.phone ?? '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="document">
        <th mat-header-cell *matHeaderCellDef>CNPJ</th>
        <td mat-cell *matCellDef="let row">{{ row.document ?? '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button [routerLink]="['/fornecedores', row.id]" matTooltip="Editar"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="deleteSupplier(row)" matTooltip="Excluir"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">Nenhum fornecedor encontrado</td>
      </tr>
    </table>
    <mat-paginator [length]="filteredSuppliers().length" [pageSize]="pageSize" [pageSizeOptions]="[10, 20, 50]" (page)="onPage($event)" showFirstLastButtons />
  </div>
</div>
