<div class="page-container">
  <app-page-header [title]="isEditMode() ? 'Editar Fornecedor' : 'Novo Fornecedor'"
    [subtitle]="isEditMode() ? 'Atualize os dados do fornecedor' : 'Preencha os dados do novo fornecedor'"
    backLink="/fornecedores" />
  @if (loading()) {
  <div class="loading-center"><mat-spinner diameter="40" /></div>
  } @else {
  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-section-title">Dados Gerais</div>
        <div class="form-grid">
          <mat-form-field appearance="outline" class="field-full">
            <mat-label>Nome *</mat-label>
            <input matInput formControlName="name" />
            @if (form.get('name')?.hasError('required') && form.get('name')?.touched) {
            <mat-error>Nome é obrigatório</mat-error>
            }
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>E-mail</mat-label>
            <input matInput type="email" formControlName="email" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Telefone</mat-label>
            <input matInput formControlName="phone" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>CNPJ</mat-label>
            <input matInput formControlName="document" />
          </mat-form-field>
        </div>
        <mat-divider class="section-divider" />
        <app-address-form [parentArray]="addressesArray" [addresses]="loadedAddresses()" />
        <div class="form-actions">
          <button mat-button type="button" routerLink="/fornecedores">Cancelar</button>
          <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
            @if (saving()) { <mat-spinner diameter="20" /> } @else { {{ isEditMode() ? 'Atualizar' : 'Salvar' }} }
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
  }
</div>
