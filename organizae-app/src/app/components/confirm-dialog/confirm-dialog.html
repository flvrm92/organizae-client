<h2 mat-dialog-title>
  <div class="dialog-icon-row">
    <mat-icon color="warn">warning</mat-icon>
    <span>{{ data.title }}</span>
  </div>
</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">{{ data.cancelLabel ?? 'Cancelar' }}</button>
  <button mat-flat-button color="warn" (click)="confirm()">{{ data.confirmLabel ?? 'Confirmar' }}</button>
</mat-dialog-actions>
